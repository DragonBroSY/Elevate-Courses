name: Publish Notes

on:
  push:
    branches: [main]
    paths-ignore:
      - 'docs/**'      # don't re-trigger on the files we generate
      - '.github/**'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run publish script
        run: python publish_notes.py

      - name: Commit generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add docs/notes/ docs/assets/ docs/sitemap.xml
          git diff --staged --quiet || git commit -m "auto: publish notes [skip ci]" && git push
