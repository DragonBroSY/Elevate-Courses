<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Courses — Recordings</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #0f1117;
      color: #e2e8f0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 1.5rem;
      max-width: 720px;
      margin: 0 auto;
    }
    h1 { font-size: 1.4rem; margin-bottom: 0.25rem; color: #fff; }
    .subtitle { font-size: 0.85rem; color: #64748b; margin-bottom: 1.5rem; }
    .feed-link { font-size: 0.8rem; color: #4a9eff; text-decoration: none; }
    .feed-link:hover { text-decoration: underline; }

    .episode {
      background: #1e2330;
      border-radius: 10px;
      padding: 1rem 1.2rem;
      margin-bottom: 1rem;
    }
    .ep-title { font-weight: 600; font-size: 1rem; margin-bottom: 0.2rem; }
    .ep-meta  { font-size: 0.78rem; color: #64748b; margin-bottom: 0.75rem; }
    audio {
      width: 100%;
      accent-color: #4a9eff;
      height: 36px;
    }
    .error { color: #f87171; padding: 2rem 0; text-align: center; }
    .loading { color: #64748b; padding: 2rem 0; text-align: center; }
  </style>
</head>
<body>
  <h1>✈ Elevate Courses</h1>
  <p class="subtitle">Flight training recordings</p>
  <p><a class="feed-link" id="feed-link" href="feed.xml">📡 Subscribe in podcast app</a></p>
  <br />
  <div id="episodes"><p class="loading">Loading episodes...</p></div>

  <script>
    async function loadFeed() {
      const container = document.getElementById("episodes");
      try {
        const res  = await fetch("feed.xml?_=" + Date.now());
        const text = await res.text();
        const xml  = new DOMParser().parseFromString(text, "text/xml");
        const items = xml.querySelectorAll("item");

        if (!items.length) {
          container.innerHTML = '<p class="loading">No episodes yet.</p>';
          return;
        }

        container.innerHTML = "";
        items.forEach(item => {
          const title    = item.querySelector("title")?.textContent || "Untitled";
          const pubDate  = item.querySelector("pubDate")?.textContent || "";
          const url      = item.querySelector("enclosure")?.getAttribute("url") || "";
          const duration = item.querySelector("duration")?.textContent || "";

          const date = pubDate ? new Date(pubDate).toLocaleDateString("en-US", {
            year: "numeric", month: "short", day: "numeric"
          }) : "";

          const meta = [date, duration].filter(Boolean).join(" · ");

          const div = document.createElement("div");
          div.className = "episode";
          div.innerHTML = `
            <div class="ep-title">${escHtml(title)}</div>
            <div class="ep-meta">${escHtml(meta)}</div>
            <audio controls preload="none" src="${escHtml(url)}"></audio>
          `;
          container.appendChild(div);
        });

      } catch (e) {
        container.innerHTML = `<p class="error">Failed to load feed: ${e.message}</p>`;
      }
    }

    function escHtml(str) {
      return str.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    loadFeed();
  </script>
</body>
</html>
