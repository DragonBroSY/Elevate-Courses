<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Elevate Courses — Flight Training</title>
  <meta name="description" content="Flight training ground school notes and voice recordings by DragonBroSY. Study for your private pilot certificate on the go." />
  <meta name="robots" content="index, follow" />
  <link rel="sitemap" type="application/xml" href="sitemap.xml" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background: #f5f7fa; color: #1a2a3a; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif; min-height: 100vh; display: flex; flex-direction: column; }

    /* NAV */
    .nav { background: #1a3a6b; border-bottom: 3px solid #c8a400; padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 56px; position: sticky; top: 0; z-index: 100; flex-wrap: wrap; }
    .nav-brand { display: flex; align-items: center; gap: 0.5rem; text-decoration: none; color: #fff; font-size: 1.05rem; font-weight: 800; letter-spacing: -0.01em; }
    .nav-brand .wing { font-size: 1.2rem; }
    .nav-links { display: flex; }
    .nav-links a, .nav-links button { background: none; border: none; cursor: pointer; color: rgba(255,255,255,0.75); text-decoration: none; font-size: 0.73rem; font-weight: 600; letter-spacing: 0.07em; text-transform: uppercase; padding: 0 0.9rem; height: 56px; display: flex; align-items: center; border-bottom: 3px solid transparent; margin-bottom: -3px; transition: color 0.15s, border-color 0.15s; font-family: inherit; }
    .nav-links a:hover, .nav-links button:hover { color: #fff; border-bottom-color: rgba(200,164,0,0.5); }
    .nav-links button.active { color: #fff; border-bottom-color: #c8a400; }

    /* MAIN */
    .main { max-width: 980px; margin: 0 auto; padding: 2rem 2rem 0; width: 100%; flex: 1; }
    .hidden { display: none; }

    /* SECTION LABEL */
    .slabel { font-size: 0.6rem; letter-spacing: 0.28em; text-transform: uppercase; color: #1a3a6b; font-weight: 700; display: inline-block; padding-bottom: 0.45rem; border-bottom: 2px solid #c8a400; margin-bottom: 1rem; }

    /* NOTE CARDS */
    .cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(210px, 1fr)); gap: 1rem; margin-bottom: 2.2rem; }
    .card { background: #fff; border: 1px solid #dde5ef; border-radius: 8px; padding: 1.3rem; text-decoration: none; color: inherit; transition: box-shadow 0.18s, border-color 0.18s, transform 0.18s; display: block; }
    .card:hover { border-color: #1a3a6b; box-shadow: 0 4px 18px rgba(26,58,107,0.13); transform: translateY(-2px); }
    .card-icon { font-size: 1.35rem; margin-bottom: 0.65rem; }
    .card-title { font-size: 0.88rem; font-weight: 700; color: #1a2a3a; margin-bottom: 0.3rem; }
    .card-desc { font-size: 0.73rem; color: #6a8aaa; line-height: 1.5; }

    /* PANEL (audios) */
    .panel { background: #fff; border: 1px solid #dde5ef; border-radius: 8px; overflow: hidden; margin-bottom: 1.5rem; }
    .panel-head { background: #1a3a6b; color: #fff; padding: 0.65rem 1.1rem; font-size: 0.7rem; font-weight: 700; letter-spacing: 0.12em; text-transform: uppercase; display: flex; align-items: center; justify-content: space-between; }
    .panel-head .accent { color: #c8a400; margin-left: 0.4rem; font-weight: 400; text-transform: none; letter-spacing: 0; }
    .panel-body { padding: 1rem; }

    .episode { background: #f5f7fa; border: 1px solid #dde5ef; border-left: 3px solid #c8a400; border-radius: 6px; padding: 0.9rem 1.1rem; margin-bottom: 0.75rem; }
    .episode:last-child { margin-bottom: 0; }
    .ep-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 0.6rem; gap: 1rem; }
    .ep-title { font-weight: 600; font-size: 0.9rem; color: #1a2a3a; line-height: 1.3; }
    .ep-badge { font-size: 0.62rem; background: #fff; color: #1a3a6b; border: 1px solid #dde5ef; border-radius: 4px; padding: 0.15rem 0.5rem; white-space: nowrap; flex-shrink: 0; font-weight: 700; }
    .ep-meta { font-size: 0.7rem; color: #9ab0c8; margin-bottom: 0.75rem; }
    audio { width: 100%; height: 36px; accent-color: #1a3a6b; }

    .subscribe { background: #fff; border: 1px solid #dde5ef; border-radius: 8px; padding: 1rem 1.2rem; display: flex; align-items: center; justify-content: space-between; gap: 1rem; flex-wrap: wrap; margin-bottom: 2.2rem; }
    .subscribe-label { font-size: 0.8rem; color: #6a8aaa; }
    .subscribe-url { font-size: 0.72rem; color: #1a3a6b; text-decoration: none; font-family: monospace; word-break: break-all; font-weight: 600; }
    .subscribe-url:hover { text-decoration: underline; }

    footer { background: #1a3a6b; border-top: 3px solid #c8a400; text-align: center; font-size: 0.6rem; color: rgba(255,255,255,0.45); padding: 1.4rem; letter-spacing: 0.15em; text-transform: uppercase; margin-top: 1rem; }

    .empty { color: #9ab0c8; padding: 2rem 0; text-align: center; font-size: 0.85rem; }
    .loading { color: #9ab0c8; padding: 2rem 0; text-align: center; font-size: 0.85rem; }
  </style>
</head>
<body>

  <nav class="nav">
    <a class="nav-brand" href="https://dragonbrosy.github.io/"><span class="wing">&#9992;</span> Elevate Courses</a>
    <div class="nav-links">
      <button class="active" data-panel="notes">Notes</button>
      <button data-panel="audios">Audios</button>
      <a href="feed.xml">Feed</a>
      <a href="https://dragonbrosy.github.io/">DragonBroSY</a>
    </div>
  </nav>

  <div class="main">

    <div id="panel-notes">
      <div class="slabel">Notes</div>
      <div id="notes-list" class="cards"><p class="loading">Loading notes...</p></div>
    </div>

    <div id="panel-audios" class="hidden">
      <div class="slabel">Audios</div>
      <div class="panel">
        <div class="panel-head">Transmissions <span class="accent" id="audios-meta">&mdash;</span></div>
        <div class="panel-body" id="episodes"><p class="loading">Establishing comms...</p></div>
      </div>

      <div class="subscribe">
        <div>
          <div class="subscribe-label">Subscribe in any podcast app</div>
          <a class="subscribe-url" href="feed.xml">
            https://dragonbrosy.github.io/Elevate-Courses/feed.xml
          </a>
        </div>
      </div>
    </div>

  </div>

  <footer>ELEVATE COURSES &nbsp;·&nbsp; DRAGONBROSY &nbsp;·&nbsp; ALL ALTITUDES RESERVED</footer>

  <script>
    function esc(s) {
      return s.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;");
    }

    let feedLoaded = false;

    async function loadFeed() {
      const container = document.getElementById("episodes");
      try {
        const res  = await fetch("feed.xml?_=" + Date.now());
        const text = await res.text();
        const xml  = new DOMParser().parseFromString(text, "text/xml");
        const items = xml.querySelectorAll("item");

        if (!items.length) {
          container.innerHTML = '<p class="empty">No transmissions yet. Drop a recording to begin.</p>';
          return;
        }

        let totalSecs = 0;
        container.innerHTML = "";

        items.forEach((item, i) => {
          const title    = item.querySelector("title")?.textContent || "Untitled";
          const pubDate  = item.querySelector("pubDate")?.textContent || "";
          const url      = item.querySelector("enclosure")?.getAttribute("url") || "";
          const durStr   = item.querySelector("duration")?.textContent || "";

          if (durStr) {
            const parts = durStr.split(":").map(Number);
            if (parts.length === 3) totalSecs += parts[0]*3600 + parts[1]*60 + parts[2];
            else if (parts.length === 2) totalSecs += parts[0]*60 + parts[1];
          }

          const date = pubDate ? new Date(pubDate).toLocaleDateString("en-US", {
            month: "short", day: "numeric", year: "numeric"
          }) : "";

          const ep = document.createElement("div");
          ep.className = "episode";
          ep.innerHTML = `
            <div class="ep-header">
              <div class="ep-title">${esc(title)}</div>
              <div class="ep-badge">EP ${String(items.length - i).padStart(2,"0")}</div>
            </div>
            <div class="ep-meta">${esc(date)}${durStr ? " &nbsp;·&nbsp; " + esc(durStr) : ""}</div>
            <audio controls preload="none" src="${esc(url)}"></audio>
          `;
          container.appendChild(ep);
        });

        const h = Math.floor(totalSecs/3600);
        const m = Math.floor((totalSecs%3600)/60);
        document.getElementById("audios-meta").textContent = `${items.length} episodes · ${h}h ${m}m`;

      } catch(e) {
        container.innerHTML = `<p class="empty">Comms failure: ${e.message}</p>`;
      }
    }

    async function loadNotes() {
      const container = document.getElementById("notes-list");
      try {
        const res  = await fetch("notes/index.html?_=" + Date.now());
        const text = await res.text();
        const doc  = new DOMParser().parseFromString(text, "text/html");

        const entries = [];

        doc.querySelectorAll(".post-content table tbody tr").forEach(tr => {
          const cells = tr.querySelectorAll("td");
          if (cells.length < 1) return;
          const a = cells[0].querySelector("a");
          if (!a) return;
          entries.push({
            href: "notes/" + a.getAttribute("href"),
            title: a.textContent.trim(),
            topics: cells[1] ? cells[1].textContent.trim() : ""
          });
        });

        doc.querySelectorAll(".post-content > ul li").forEach(li => {
          const a = li.querySelector("a");
          if (!a) return;
          entries.push({
            href: "notes/" + a.getAttribute("href"),
            title: a.textContent.trim(),
            topics: li.textContent.replace(a.textContent, "").replace(/^[\s–-]+/, "").trim()
          });
        });

        if (!entries.length) {
          container.innerHTML = '<p class="empty">No notes yet.</p>';
          return;
        }

        container.innerHTML = "";
        entries.forEach(e => {
          const card = document.createElement("a");
          card.className = "card";
          card.href = e.href;
          card.innerHTML = `
            <div class="card-icon">&#128220;</div>
            <div class="card-title">${esc(e.title)}</div>
            ${e.topics ? `<div class="card-desc">${esc(e.topics)}</div>` : ""}
          `;
          container.appendChild(card);
        });

      } catch(e) {
        container.innerHTML = `<p class="empty">Couldn't load notes: ${e.message}</p>`;
      }
    }

    document.querySelectorAll(".nav-links button[data-panel]").forEach(btn => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".nav-links button[data-panel]").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");

        const panel = btn.dataset.panel;
        document.getElementById("panel-notes").classList.toggle("hidden", panel !== "notes");
        document.getElementById("panel-audios").classList.toggle("hidden", panel !== "audios");

        if (panel === "audios" && !feedLoaded) {
          feedLoaded = true;
          loadFeed();
        }
      });
    });

    loadNotes();
  </script>
</body>
</html>
