---
layout: default
---
<article>
  <header style="margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid #e8e8e8;">
    <p style="font-size: 0.85rem; color: #828282; margin-bottom: 0.5rem;">
      <a href="{{ site.baseurl }}/">Elevate Courses</a>
      &rsaquo;
      <a href="{{ site.baseurl }}/notes/">Notes</a>
      &rsaquo;
      {{ page.title }}
    </p>
    <h1 style="margin: 0;">{{ page.title }}</h1>
    {% if page.date %}
    <p style="font-size: 0.85rem; color: #828282; margin-top: 0.25rem;">
      {{ page.date | date: "%B %-d, %Y" }}
    </p>
    {% endif %}
  </header>

  <div class="post-content">
    {{ content }}
  </div>
</article>

<script>
  MathJax = { tex: { inlineMath: [['$','$']] } };
</script>
<script src="https://cdn.jsdelivr.net/npm/mathjax@3/es5/tex-chtml.js"></script>
