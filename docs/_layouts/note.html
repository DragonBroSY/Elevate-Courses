<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{ page.title }} — Elevate Courses</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #090c12;
      color: #d4dce8;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      min-height: 100vh;
      line-height: 1.6;
    }
    .topbar {
      display: flex;
      align-items: center;
      gap: 1rem;
      padding: 0.75rem 1.5rem;
      background: #0d1117;
      border-bottom: 1px solid #1e2a38;
      font-size: 0.72rem;
      letter-spacing: 0.08em;
    }
    .topbar a {
      color: #4a9eff;
      text-decoration: none;
    }
    .topbar a:hover { text-decoration: underline; }
    .topbar-sep { color: #2a4a6a; }
    .topbar-title { color: #7a8fa8; }
    .main {
      max-width: 720px;
      margin: 0 auto;
      padding: 2rem 1.5rem;
    }
    h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.02em;
      margin-bottom: 0.3rem;
    }
    .note-meta {
      font-size: 0.72rem;
      color: #3a5a7a;
      margin-bottom: 2rem;
      padding-bottom: 1rem;
      border-bottom: 1px solid #1a2530;
    }
    .note-body h1, .note-body h2, .note-body h3 {
      color: #e2eaf5;
      margin: 1.5rem 0 0.5rem;
      font-weight: 600;
    }
    .note-body h1 { font-size: 1.3rem; }
    .note-body h2 { font-size: 1.1rem; }
    .note-body h3 { font-size: 0.95rem; letter-spacing: 0.05em; text-transform: uppercase; color: #4a9eff; }
    .note-body p { margin-bottom: 0.75rem; color: #c4d4e4; }
    .note-body ul, .note-body ol {
      margin: 0.5rem 0 0.75rem 1.5rem;
      color: #c4d4e4;
    }
    .note-body li { margin-bottom: 0.25rem; }
    .note-body code {
      background: #0d1520;
      border: 1px solid #1a2a3a;
      border-radius: 3px;
      padding: 0.1em 0.4em;
      font-size: 0.85em;
      color: #4a9eff;
    }
    .note-body pre {
      background: #0d1520;
      border: 1px solid #1a2a3a;
      border-left: 3px solid #1a4a7a;
      border-radius: 6px;
      padding: 1rem;
      overflow-x: auto;
      margin-bottom: 1rem;
    }
    .note-body pre code {
      background: none;
      border: none;
      padding: 0;
      color: #c4d4e4;
    }
    .note-body a { color: #4a9eff; }
    .note-body hr {
      border: none;
      border-top: 1px solid #1a2530;
      margin: 1.5rem 0;
    }
    .note-body blockquote {
      border-left: 3px solid #1a4a7a;
      padding-left: 1rem;
      color: #7a8fa8;
      margin: 0.5rem 0;
    }
    .note-body table {
      width: 100%;
      border-collapse: collapse;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .note-body th, .note-body td {
      border: 1px solid #1a2a3a;
      padding: 0.4rem 0.75rem;
      text-align: left;
    }
    .note-body th { background: #0d1520; color: #4a9eff; }
    footer {
      text-align: center;
      font-size: 0.65rem;
      color: #243040;
      padding: 2rem 1rem;
      letter-spacing: 0.1em;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a href="{{ site.baseurl }}/">&#8592; Elevate Courses</a>
    <span class="topbar-sep">/</span>
    <a href="{{ site.baseurl }}/notes/">Notes</a>
    <span class="topbar-sep">/</span>
    <span class="topbar-title">{{ page.title }}</span>
  </div>
  <div class="main">
    <h1>{{ page.title }}</h1>
    {% if page.date %}<div class="note-meta">{{ page.date | date: "%b %-d, %Y" }}</div>{% endif %}
    <div class="note-body">
      {{ content }}
    </div>
  </div>
  <footer>ELEVATE COURSES &nbsp;·&nbsp; DRAGONBROSY &nbsp;·&nbsp; ALL ALTITUDES RESERVED</footer>
</body>
</html>
